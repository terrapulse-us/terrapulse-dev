name: EAS Build iOS

# Required GitHub repo secrets:
#   EXPO_TOKEN             — expo.dev → Account Settings → Access Tokens
#   MAPTILER_API_KEY       — your MapTiler key
#   GOOGLE_WEB_CLIENT_ID   — Google OAuth client ID
#   MAPBOX_PUBLIC_TOKEN    — Mapbox public token
#
# Required for automatic TestFlight submission (step below):
#   ASC_API_KEY_ID         — App Store Connect → Users → Integrations → API Keys → Key ID
#   ASC_API_KEY_ISSUER_ID  — Issuer ID on that same page (shown at top)
#   ASC_API_KEY_CONTENT    — full text of the .p8 file you downloaded

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "Build profile"
        required: true
        default: "preview"
        type: choice
        options:
          - preview
          - production
  push:
    branches:
      - main
      - "release/**"

jobs:
  build-and-submit-ios:
    name: Build & Submit iOS to TestFlight
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Push secrets to EAS environment
        working-directory: artifacts/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
          MAPBOX_PUBLIC_TOKEN: ${{ secrets.MAPBOX_PUBLIC_TOKEN }}
        run: |
          push_env() {
            local name="$1"
            local value="$2"
            if [ -z "$value" ]; then
              echo "Skipping $name (empty)"
              return
            fi
            echo "$value" | eas env:create --name "$name" \
              --type plaintext --scope project --non-interactive 2>/dev/null \
            || echo "$value" | eas env:update --name "$name" \
              --scope project --non-interactive 2>/dev/null \
            || echo "Warning: could not set $name in EAS"
          }
          push_env GOOGLE_WEB_CLIENT_ID "$GOOGLE_WEB_CLIENT_ID"
          push_env MAPBOX_PUBLIC_TOKEN "$MAPBOX_PUBLIC_TOKEN"

      - name: Build iOS
        working-directory: artifacts/mobile
        env:
          MAPBOX_DOWNLOAD_TOKEN: ${{ secrets.MAPBOX_DOWNLOAD_TOKEN }}
        run: eas build --platform ios --profile ${{ inputs.profile || 'preview' }} --non-interactive

      # ── Automatic TestFlight submission ────────────────────────────────────
      # Requires ASC_API_KEY_* secrets (see top of file).
      # If those secrets aren't set yet, skip this step — go to expo.dev after
      # the build finishes and click "Submit to App Store" manually.
      - name: Submit iOS to TestFlight
        if: ${{ env.ASC_API_KEY_ID != '' }}
        working-directory: artifacts/mobile
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_KEY_ISSUER_ID: ${{ secrets.ASC_API_KEY_ISSUER_ID }}
          ASC_API_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
        run: |
          # Write the .p8 content to a temp file then delete it after submit
          KEY_PATH="/tmp/AuthKey_${ASC_API_KEY_ID}.p8"
          printf '%s' "$ASC_API_KEY_CONTENT" > "$KEY_PATH"
          eas submit \
            --platform ios \
            --latest \
            --non-interactive \
            --asc-api-key-path "$KEY_PATH" \
            --asc-api-key-id "$ASC_API_KEY_ID" \
            --asc-api-key-issuer-id "$ASC_API_KEY_ISSUER_ID"
          rm -f "$KEY_PATH"
