name: EAS OTA Update

on:
  push:
    branches: [main]

jobs:
  update:
    name: Publish OTA Update
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.1
      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --force
      - name: Install hermesc class-syntax wrapper
        run: bash scripts/install-hermesc-wrapper.sh --force
      - name: Publish OTA update to preview channel
        working-directory: artifacts/mobile
        continue-on-error: true
        env:
          MAPTILER_API_KEY: ${{ secrets.MAPTILER_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          EXPO_PUBLIC_MAPTILER_KEY: ${{ secrets.MAPTILER_API_KEY }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          NODE_PATH: ${{ github.workspace }}/node_modules
        run: |
          SUBJECT=$(printf '%s' "$COMMIT_MSG" | head -1)
          eas update --channel preview --message "$SUBJECT" --non-interactive
