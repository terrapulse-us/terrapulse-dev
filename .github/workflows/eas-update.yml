name: EAS OTA Update

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "EAS channel to publish to (preview = Android, production = iOS)"
        required: true
        default: "preview"
        type: choice
        options:
          - preview
          - production
      platform:
        description: "Platform to update"
        required: true
        default: "android"
        type: choice
        options:
          - android
          - ios
          - all
      message:
        description: "Update message"
        required: false
        default: "Manual OTA update"

jobs:
  update:
    name: Publish OTA Update
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.1

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --force

      - name: Install hermesc class-syntax wrapper
        run: bash scripts/install-hermesc-wrapper.sh --force

      - name: Publish OTA update
        working-directory: artifacts/mobile
        env:
          MAPTILER_API_KEY: ${{ secrets.MAPTILER_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          EXPO_PUBLIC_MAPTILER_KEY: ${{ secrets.MAPTILER_API_KEY }}
          EXPO_PUBLIC_NPS_API_KEY: ${{ secrets.EXPO_PUBLIC_NPS_API_KEY }}
          EXPO_PUBLIC_RIDB_API_KEY: ${{ secrets.EXPO_PUBLIC_RIDB_API_KEY }}
          NODE_PATH: ${{ github.workspace }}/node_modules
        run: |
          if [ "${{ github.event.inputs.platform }}" = "all" ]; then
            eas update --channel ${{ github.event.inputs.channel }} --message "${{ github.event.inputs.message }}" --non-interactive
          else
            eas update --channel ${{ github.event.inputs.channel }} --platform ${{ github.event.inputs.platform }} --message "${{ github.event.inputs.message }}" --non-interactive
          fi
