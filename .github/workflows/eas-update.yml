name: EAS OTA Update

on:
  push:
    branches: [main]

jobs:
  update:
    name: Publish OTA Update
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.1

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Publish OTA update → preview channel
        working-directory: artifacts/mobile
        env:
          MAPTILER_API_KEY: ${{ secrets.MAPTILER_API_KEY }}
        run: |
          eas update \
            --channel preview \
            --message "${{ github.event.head_commit.message }}" \
            --non-interactive

      - name: Publish OTA update → production channel
        working-directory: artifacts/mobile
        env:
          MAPTILER_API_KEY: ${{ secrets.MAPTILER_API_KEY }}
        run: |
          eas update \
            --channel production \
            --message "${{ github.event.head_commit.message }}" \
            --non-interactive
